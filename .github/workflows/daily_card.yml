name: Daily Oblique Strategy

on:
  schedule:
    # Runs at 13:00 UTC (6:00 AM EST / 3:00 AM PST) every morning
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  post-card:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Post Oblique Strategy
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Fetch a random strategy card from API
          CARD=$(curl -s https://raw.githubusercontent.com/skylark/oblique-strategies/master/strategies.json | jq -r '.[]' | shuf -n 1)

          # Escape quotes for JSON payload
          SAFE_CARD=$(echo "$CARD" | sed 's/"/\\"/g')

          # Post to Slack as a nicely formatted block
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"*Today's Oblique Strategy:*\n> _$SAFE_CARD_\"}" \
            $SLACK_WEBHOOK_URL
